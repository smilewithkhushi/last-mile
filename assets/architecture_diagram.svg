<svg width="1000" height="900" viewBox="0 0 1000 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#444441" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1000" height="900" fill="#FFFFFF"/>

  <text x="500" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="600" fill="#2C2C2A">Last Mile — System Architecture</text>
  <text x="500" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5F5E5A">Persistent delivery-site memory, built on Cognee's hybrid graph + vector memory layer</text>

  <!-- ============ CLIENT LAYER ============ -->
  <text x="60" y="112" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#888780">CLIENT LAYER</text>

  <rect x="140" y="90" width="260" height="70" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="270" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#042C53">Driver App</text>
  <text x="270" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0C447C">Logs delivery notes, receives pre-arrival briefings</text>

  <rect x="600" y="90" width="260" height="70" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="730" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#042C53">Ops Dashboard</text>
  <text x="730" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0C447C">Views failure patterns and estimated cost impact</text>

  <!-- arrows down to API layer -->
  <line x1="270" y1="160" x2="330" y2="222" stroke="#444441" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="730" y1="160" x2="670" y2="222" stroke="#444441" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="330" y="190" font-family="Arial, sans-serif" font-size="11" fill="#5F5E5A">POST /notes, GET /briefing</text>
  <text x="595" y="190" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#5F5E5A">GET /impact</text>

  <!-- ============ API LAYER ============ -->
  <text x="60" y="212" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#888780">API LAYER</text>

  <rect x="220" y="230" width="560" height="90" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="500" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#26215C">FastAPI Service</text>
  <text x="500" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#3C3489">Auth, validation, routing</text>
  <text x="500" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#3C3489">calls: remember() · recall() · improve() · forget()</text>

  <!-- arrow down to Cognee layer -->
  <line x1="500" y1="320" x2="500" y2="378" stroke="#444441" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ============ COGNEE MEMORY LAYER ============ -->
  <text x="60" y="368" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#888780">COGNEE MEMORY LAYER</text>

  <rect x="120" y="380" width="760" height="260" rx="16" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="500" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#04342C">Hybrid Graph + Vector Memory</text>
  <text x="500" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#085041">Routes each query between exact graph facts and semantic similarity</text>

  <!-- Graph store -->
  <rect x="160" y="460" width="320" height="150" rx="12" fill="#EAF3DE" stroke="#639922" stroke-width="1"/>
  <text x="320" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#173404">Graph Store</text>
  <text x="320" y="512" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#27500A">Location · Driver · Note</text>
  <text x="320" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#27500A">DeliveryEvent · ConflictRecord</text>
  <text x="320" y="548" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#27500A">edges: has, reported_by,</text>
  <text x="320" y="564" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#27500A">produced_during, similar_to</text>
  <text x="320" y="588" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-style="italic" fill="#3B6D11">used for: known-location recall,</text>
  <text x="320" y="602" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-style="italic" fill="#3B6D11">reconciliation, confidence tracking</text>

  <!-- Vector store -->
  <rect x="520" y="460" width="320" height="150" rx="12" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="680" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#412402">Vector Store</text>
  <text x="680" y="512" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#633806">Note text embeddings</text>
  <text x="680" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#633806">LandmarkTag embeddings</text>
  <text x="680" y="548" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#633806">(temple ≈ mandir ≈ regional alias)</text>
  <text x="680" y="588" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-style="italic" fill="#854F0B">used for: cold-start locations</text>
  <text x="680" y="602" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-style="italic" fill="#854F0B">with zero direct history</text>

  <!-- connector between stores -->
  <line x1="480" y1="535" x2="520" y2="535" stroke="#0F6E56" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="500" y="525" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#0F6E56">routed by Cognee</text>

  <!-- arrows down to persistence -->
  <line x1="320" y1="640" x2="320" y2="700" stroke="#444441" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="680" y1="640" x2="680" y2="700" stroke="#444441" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ============ PERSISTENCE LAYER ============ -->
  <text x="60" y="690" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#888780">PERSISTENCE LAYER</text>

  <rect x="160" y="700" width="320" height="70" rx="10" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text x="320" y="730" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#2C2C2A">Graph Database</text>
  <text x="320" y="750" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#444441">Cognee default, or Neo4j</text>

  <rect x="520" y="700" width="320" height="70" rx="10" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text x="680" y="730" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#2C2C2A">Vector Database</text>
  <text x="680" y="750" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#444441">Cognee default, or Qdrant</text>

  <!-- ============ BACKGROUND JOBS ============ -->
  <rect x="120" y="800" width="760" height="70" rx="10" fill="#FBEAF0" stroke="#993556" stroke-width="1"/>
  <text x="500" y="828" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#4B1528">Scheduled background jobs</text>
  <text x="500" y="850" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#72243E">improve()/memify: reconciles conflicting notes · forget(): decays stale facts, handles manual purges</text>

  <line x1="500" y1="770" x2="500" y2="800" stroke="#444441" stroke-width="1.2" marker-end="url(#arrow)"/>

</svg>
